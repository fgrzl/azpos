
name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        
    - name: Install dependencies
      working-directory: ./ts
      run: npm install
      
    - name: Lint
      working-directory: ./ts
      run: npm run lint
      
    - name: Build
      working-directory: ./ts
      run: npm run build
      
    - name: Test
      working-directory: ./ts
      run: npm test

  golang:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'
        
    - name: Build
      working-directory: ./go
      run: go build ./...
      
    - name: Test
      working-directory: ./go
      run: go test -v ./...
      
    - name: Test with coverage
      working-directory: ./go
      run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
